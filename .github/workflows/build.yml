name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-env
      - name: Zoneless runtime guard
        run: npm run check:zoneless-runtime
      - name: Build
        run: npm run build --if-present
