name: Lambda Tests

on:
  push:
    paths:
      - 'amplify/backend/function/GigRaptorService/**'
      - '.github/workflows/lambda-tests.yml'
      - '.github/actions/setup-dotnet-env/**'
  pull_request:
    paths:
      - 'amplify/backend/function/GigRaptorService/**'
      - '.github/workflows/lambda-tests.yml'
      - '.github/actions/setup-dotnet-env/**'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dotnet-env
        with:
          solution-path: amplify/backend/function/GigRaptorService/GigRaptorService.sln

      - name: Build
        run: dotnet build amplify/backend/function/GigRaptorService/GigRaptorService.sln --no-restore

      - name: Run tests
        run: dotnet test amplify/backend/function/GigRaptorService/GigRaptorService.sln --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: lambda
          name: lambda-coverage
          fail_ci_if_error: false

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dotnet-env
        with:
          solution-path: amplify/backend/function/GigRaptorService/GigRaptorService.sln

      - name: Check formatting
        run: dotnet format amplify/backend/function/GigRaptorService/GigRaptorService.sln --verify-no-changes
