name: 'Setup Node environment'
description: 'Install Node 20, ensure npm v10, and install dependencies with legacy peer deps'

runs:
  using: 'composite'
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    - name: Ensure npm v10 (compatible with Node 20)
      shell: bash
      run: npm install -g npm@10
    - name: Install dependencies
      shell: bash
      run: npm ci --legacy-peer-deps
