version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    groups:
      all-dependencies:
        patterns:
          - "*"
