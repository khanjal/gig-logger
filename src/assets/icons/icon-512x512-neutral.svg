<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full canvas: dark grey background; inner rounded surface remains light -->
  <rect width="100%" height="100%" fill="#0e2433"/>

  <!-- Light blue rounded surface behind the icon to fit app theme -->
  <rect x="48" y="48" width="416" height="416" rx="48" ry="48" fill="#e6f3ff"/>

  <!-- Place the original PNG centered over the light surface -->
  <image href="icon-512x512.png" x="64" y="64" width="384" height="384" preserveAspectRatio="xMidYMid meet"/>
</svg>