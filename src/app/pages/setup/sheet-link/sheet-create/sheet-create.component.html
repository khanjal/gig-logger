<div class="section bg-surface text-secondary rounded-md">
  <form class="sheet-form mt-5" [formGroup]="sheetCreate">
      <app-base-input 
        class="field-full-width"
        label="Sheet Name"
        type="text"
        placeholder="Enter Name"
        formControlName="sheetName"
        [required]="true"
        hint="Give your new sheet a name">
      </app-base-input>
  </form>

    <div class="row-flex px-5" style="justify-content: space-between;">
      <app-base-rect-button variant="secondary" [icon]="'refresh'" (clicked)="closeModal()" class="mr-auto" [label]="'Cancel'"></app-base-rect-button>
      <app-base-rect-button variant="primary" [icon]="'add'" [disabled]="!sheetCreate.valid" (clicked)="createSheet()" class="ml-auto" [label]="'Create'"></app-base-rect-button>
    </div>
</div>
