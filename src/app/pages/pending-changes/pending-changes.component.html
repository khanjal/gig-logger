<div class="page-container">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Pending Changes</h2>
  </div>

  <mat-accordion multi="false">
    <mat-expansion-panel id="shifts-panel" [expanded]="expandedShifts()">
      <mat-expansion-panel-header>
        <mat-panel-title>Shifts ({{ shifts().length || 0 }})</mat-panel-title>
      </mat-expansion-panel-header>

      <div *ngIf="shifts().length > 0; else noShifts">
        @for (s of shifts(); track (s.rowId || s.key || $index); let i = $index) {
          <app-shifts-quick-view [shift]="s" [index]="i" [isDuplicate]="!!s.key && duplicateShiftKeys().has(s.key)" [inlineMode]="true" (parentReload)="load()" (edit)="openShiftEditor($event)"></app-shifts-quick-view>
        }
      </div>
      <ng-template #noShifts>
        <div class="p-4 text-sm no-pending">No pending shifts</div>
      </ng-template>
    </mat-expansion-panel>

    <mat-expansion-panel id="trips-panel" [expanded]="expandedTrips()">
      <mat-expansion-panel-header>
        <mat-panel-title>Trips ({{ trips().length || 0 }})</mat-panel-title>
      </mat-expansion-panel-header>

      <div *ngIf="trips().length > 0; else noTrips">
        @for (t of trips(); track (t.rowId || t.key || $index); let i = $index) {
          <trips-quick-view [trip]="t" [index]="i" [showActions]="true" [inlineMode]="true" (parentReload)="load()" (editClicked)="openTripEditor($event)"></trips-quick-view>
        }
      </div>
      <ng-template #noTrips>
        <div class="p-4 text-sm no-pending">No pending trips</div>
      </ng-template>
    </mat-expansion-panel>
  </mat-accordion>
</div>
