<div class="mx-auto p-4 w-full max-w-4xl space-y-3">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold text-primary">Log</h1>
    <app-base-rect-button variant="primary" (clicked)="createShift()" [icon]="'playlist_add'" [label]="'New Shift'"></app-base-rect-button>
  </div>

  <!-- Add Shift Form -->
  <div *ngIf="showAddShiftForm" class="rounded-lg border border-soft bg-surface p-3 space-y-3">
    <log-shift-quick-form
      [nextNumber]="nextShiftNumber"
      (recomputeNumber)="handleQuickShiftRecompute($event)"
      (submitShift)="handleQuickShiftSubmit($event)"
      (cancel)="showAddShiftForm = false"
    ></log-shift-quick-form>
  </div>

  <!-- Shifts List (Grouped) -->
  <div class="space-y-4 overflow-auto" style="max-height: 70vh;" (scroll)="onScroll($event)">
    <!-- Quick view summary -->
    <log-quick-view [shifts]="shifts" (addTrip)="addTrip($event)" (editShift)="handleQuickEdit($event)"></log-quick-view>

    <div *ngFor="let s of shifts" class="shift-card space-y-3" [ngClass]="getServiceClass(s.service)">
      <!-- Group Header -->
      <div class="flex items-center justify-between">
        <div class="font-medium text-primary">Shift</div>
        <app-base-fab-button fabStyle="mini" variant="primary" (clicked)="addTrip(s.id)" matTooltip="Add Trip" [icon]="'add'"></app-base-fab-button>
      </div>

      <!-- Shift Basics -->
      <div class="grid grid-cols-1 gap-3">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Date</mat-label>
          <input matInput type="date" [(ngModel)]="s.date" [disabled]="!s.editing">
        </mat-form-field>

        <!-- Use reusable search inputs for service and region -->
        <app-search-input
          [fieldName]="'Service'"
          [searchType]="'Service'"
          [isRequired]="true"
          (valueChanged)="s.service = $event"
        ></app-search-input>

        <app-search-input
          [fieldName]="'Region'"
          [searchType]="'Region'"
          [isRequired]="true"
          (valueChanged)="s.region = $event"
        ></app-search-input>

        <mat-form-field appearance="outline" class="opacity-60 w-full">
          <mat-label>Shift #</mat-label>
          <input matInput [disabled]="true" [(ngModel)]="s.number" placeholder="Auto">
        </mat-form-field>
      </div>

      <!-- Edit Toggle -->
      <div class="flex justify-end">
        <app-base-rect-button variant="secondary" (clicked)="toggleEdit((s.id ?? '').toString())" [label]="s.editing ? 'Done' : 'Edit'"></app-base-rect-button>
      </div>

      <!-- Trips in this shift -->
      <div class="space-y-2" *ngIf="s.items.length">
        <div class="text-sm font-medium text-secondary">Trips</div>
        <div *ngFor="let t of s.items" class="trip-item" [ngClass]="getServiceClass(t.service)">
          <div class="text-secondary">Service: {{ t.service }}</div>
          <div class="text-tertiary">Start: {{ t.pickupTime }} End: {{ t.dropoffTime }}</div>
          <div class="text-secondary">Total: {{ t.total }}</div>
        </div>
      </div>

      <!-- Trip Quick Form (per shift) -->
      <div *ngIf="showTripFormFor === (s.id ?? '').toString()" class="space-y-3">
        <log-trip-quick-form [shiftId]="s.id" (submitTrip)="handleQuickTripSubmit($event)"></log-trip-quick-form>
      </div>
    </div>
  </div>
</div>
