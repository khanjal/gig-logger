<div class="address-container">
  <form [formGroup]="addressForm">
      <mat-form-field class="field-full-width" appearance="fill">
          <mat-label>Search Address</mat-label>
          <input type="text"
              name="address"
              placeholder="Enter Address"
              matInput
              formControlName="address"
              (input)="onTextChange()"
              (focus)="onInputFocus()"
              (blur)="onInputBlur()"
              #address />
          <app-base-icon-button
            matSuffix
            [icon]="'clear'"
            [iconColor]="'var(--error-500)'"
            aria-label="Clear Address"
            class="h-8 w-8"
            [style.visibility]="address.value ? 'visible' : 'hidden'"
            (clicked)="addressForm.controls.address.setValue('')">
          </app-base-icon-button>
      </mat-form-field>
  </form>
  
  <!-- Loading indicator -->
  <div *ngIf="isLoading" class="loading-indicator">
    Searching...
  </div>
  
  <!-- Suggestions dropdown -->
  <div *ngIf="showSuggestions && suggestions.length > 0" class="suggestions-container">
    <div *ngFor="let suggestion of suggestions" 
         class="suggestion-item"
         (click)="selectSuggestion(suggestion)">
      <div class="suggestion-main">{{ suggestion.place }}</div>
      <div class="suggestion-secondary">{{ suggestion.address }}</div>
    </div>
  </div>
</div>
