<div class="flex flex-col items-start w-full">
  <div *ngIf="showDailyAverage" (click)="toggle()" class="flex items-center gap-2 p-2 rounded-md bg-success-soft cursor-pointer transition-colors text-sm min-h-[40px]">
    <mat-icon class="text-success text-xl min-w-[24px]">event</mat-icon>
    <div class="flex flex-col min-w-0">
      <div class="font-semibold text-primary whitespace-nowrap">{{ currentDayAmount | currency }} <span class="text-secondary font-normal">/ {{ dailyAverage | currency }}</span></div>
    </div>
  </div>

  <div *ngIf="showWeeklyAverage" (click)="toggle()" class="flex items-center gap-2 p-2 rounded-md bg-primary-soft cursor-pointer transition-colors text-sm min-h-[40px]">
    <mat-icon class="text-info text-xl min-w-[24px]">date_range</mat-icon>
    <div class="flex flex-col min-w-0">
      <div class="font-semibold text-primary whitespace-nowrap">{{ currentWeekAmount | currency }} <span class="text-secondary font-normal">/ {{ weeklyAverage | currency }}</span></div>
    </div>
  </div>

  <div *ngIf="showMonthlyAverage" (click)="toggle()" class="flex items-center gap-2 p-2 rounded-md bg-warning-soft cursor-pointer transition-colors text-sm min-h-[40px]">
    <mat-icon class="text-warning text-xl min-w-[24px]">calendar_month</mat-icon>
    <div class="flex flex-col min-w-0">
      <div class="font-semibold text-primary whitespace-nowrap">{{ currentMonthAmount | currency }} <span class="text-secondary font-normal">/ {{ monthlyAverage | currency }}</span></div>
    </div>
  </div>
</div>
