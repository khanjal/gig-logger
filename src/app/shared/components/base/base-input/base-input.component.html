<div class="app-base-input">
  <mat-form-field class="input-field rg-field-shell" [class.input-field--with-clear]="showClear" appearance="fill" [class.has-error]="errorState">
    @if (label) {
      <mat-label>
        {{ label }}
      </mat-label>
    }

    @if (icon && iconPosition === 'left') {
      <mat-icon matPrefix class="input-icon">
        {{ icon }}
      </mat-icon>
    }

    <input
      #inputElement
      matInput
      [type]="type"
      [value]="value ?? ''"
      [disabled]="disabled"
      [required]="isRequired"
      [placeholder]="placeholder || ''"
      [attr.aria-invalid]="errorState"
      (input)="onValueChange(inputElement.value)"
      (blur)="onBlur()"
      />

      @if (icon && iconPosition === 'right') {
        <mat-icon matSuffix class="input-icon">
          {{ icon }}
        </mat-icon>
      }

      @if (showClearButton) {
        <app-base-field-button
          [fab]="true"
          fabStyle="mini"
          [icon]="'clear'"
          [iconColor]="'var(--error-500)'"
          matSuffix
          class="standard-button"
          color="accent"
          aria-label="Clear Field"
          (clicked)="onClear()">
        </app-base-field-button>
      }

      @if (hint && !hasError()) {
        <mat-hint>{{ hint }}</mat-hint>
      }
      @if (hasError()) {
        <mat-error>{{ error || getErrorMessage() }}</mat-error>
      }
    </mat-form-field>
  </div>
