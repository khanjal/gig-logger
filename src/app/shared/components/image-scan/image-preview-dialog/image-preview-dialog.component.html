<div class="relative w-full h-full flex items-center justify-center bg-gray-900">
  <img
    [src]="data.imageUrl"
    alt="OCR screenshot preview"
    class="max-w-full max-h-full w-full h-full object-contain" />

  <app-base-icon-button
    class="absolute top-4 right-4 z-10 bg-black/50 rounded-full p-1 hover:bg-black/70 transition-colors"
    [icon]="'close'"
    [iconColor]="'white'"
    (clicked)="close()">
  </app-base-icon-button>
</div>
