<div class="flex flex-col gap-4 h-full w-full bg-gray-900 p-2">
  <div class="flex items-center justify-between">
    <h2 class="m-0 text-xl font-medium text-white">Screenshot Preview</h2>
    <app-base-icon-button
      [icon]="'close'"
      [iconColor]="'var(--error-500)'"
      (clicked)="close()">
    </app-base-icon-button>
  </div>

  <div class="flex-1 flex items-center justify-center overflow-hidden rounded-lg">
    <img
      [src]="data.imageUrl"
      alt="OCR screenshot preview"
      class="max-w-full max-h-full w-full h-full object-contain" />
  </div>
</div>
